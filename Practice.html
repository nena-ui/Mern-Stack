<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Login Page</title>
    <style>

        body{
            margin: 0;
            height: 100px;
            font-family: Arial, Helvetica, sans-serif;

        }

        .sidebar{
            background-color: rgb(107, 107, 177);
            color: aliceblue;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
        }

        .main{
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
        }

        .login-box{
            background: white;
            padding: 30px;
            width: 300px;
            border-radius: 8px;
            display: flex;
            felx direction: column;
        }

        .login-box h2{
            text-align:center ;
            margin-bottom: 20px;
        }

        .login-box input{
            margin: 10px 0;
            padding: 10px;
            border: 1px solid red;
            border-radius:4px ;
        }

        .login-box button{
               margin-top: 10px;
      padding: 10px;
      background-color: #3498db;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
    }

    .login-box button:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Sidebar</h2>
    <p>Links or info here</p>
  </div>

  <div class="main">
    <div class="login-box">
      <h2>Login</h2>
      <form>
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>

    </style>
</head>
<body>
    
</body>
</html>
