<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion</title>
</head>

<style>

    *{
    margin: 0;
    padding: 0;
    box-sizing: border-box; 
}

h1{
    color: rgb(121, 28, 28);
}

p{
    color: rgb(191, 134, 69);
}

nav{
    display: flex;
    justify-content: space-between;
    padding: 20px 80px;
    height: 10vh;
    align-items: center;
}
.nav-items{
    display: flex;
    gap: 40px;
    align-items: center;
}
.hero{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 80px;
    height: 90vh;
}

.hero .textarea{
    width: 40%;
    display: flex;
    flex-direction: column;
    gap: 32px;
}

.hero .imgarea{
  height: 450px;
  width: 450px;
  position: relative;
}
.imgarea img{
    height: 100%;
    width: 100%;
    object-fit: cover;
}

.textarea button{
    background-color: rgb(126, 67, 67);
    color: white;
     margin: 0%;
    border-radius: 25px;
    height: 45px;
    width: 110px;
    border: none;
}


.form{
    display: flex;
    gap: 20px;
    align-items: center;
}

.form button{
    background-color: rgb(88, 62, 16);
    color: white;
    border-radius: 25px;
    height: 40px;
    width: 90px;
    border: none;
}




</style>
<body>
    <nav>
        <h1>CHIC DROP</h1>

        <div class="nav-items">
            <div>Home</div>
            <div>About</div>
            <div>Services</div>
            <div>Products</div>
            <div>Contacts</div>
        </div>
        <div class="form">
            <a href="Form.html"> <button class="button">Login</button></a>
            <button>Sign Up</button>
        </div>

    </nav>

    <div class="hero">
        <div class="textarea">
            <h1>Fashion fresh, confidence fierce.</h1>
    <p class="model"> Style that speaks volumes isn’t about labels — it’s about the confidence stitched into every detail, the way you carry yourself, and the energy you bring</p>
        <button class="button">Shop now</button>
        </div>
        <div class="imgarea">
            <img src="ops.jpg" alt="">
        </div>
    
    </div>
    
</body>
</html>
